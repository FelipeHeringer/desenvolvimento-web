<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atv 2</title>
</head>

<body>
    <h1>Pagina de Cadastro</h1>
    <form action="/register" method="post">
        <fieldset>
            <legend>
                Crie sua conta
            </legend>

            <label for="name">Nome:</label>
            <br>
            <input type="text" name="name" id="name" required>
            <br><br>

            <label for="email">Email:</label>
            <br>
            <input type="email" name="email"  id="email" placeholder="seuemail@dominio.com" required>
            <br><br>

            <label for="password">Senha (Minimo 8 caracteres):</label>
            <br>
            <input type="password" name="password" id="password" minlength="8" required>
            <br><br>

            <strong><label for="gender">Gênero:</label></strong>
            <br><br>
            <input type="radio" name="gender" value="female">Feminino
            <br>
            <input type="radio" name="gender" value="male">Masculino
            <br>
            <input type="radio" name="gender" value="other">Outro
            <br><br>

            <label for="biography">Biografia:</label>
            <br>
            <textarea name="biography" id="biography" rows="5" placeholder="Conte um pouco sobre você..."></textarea>
            <br>

            <input type="checkbox" name="terms" id="terms" required>Eu li e aceito os termos de serviço
        </fieldset>
        <br>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>

</html>
